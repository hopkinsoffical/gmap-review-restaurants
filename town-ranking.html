<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Best Restaurants — EatAdvisor Town Ranking</title>
<meta name="description" content="The EatAdvisor ranking of restaurants in this town and nearby — scored 0–100 and ordered high to low. Filter by cuisine.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary-100:#efffcc;--primary-200:#d9ff80;--primary-300:#c8ff4d;--primary-400:#052005;
  --primary-500:#052005;--primary-600:#041804;--primary-700:#021502;
  --lime:#b0ff00;
  --neutral-bg:#e8ffb3;--neutral-white:#ffffff;--neutral-100:#efffcc;--neutral-200:#d4f5a0;
  --neutral-300:#b8e86a;--neutral-600:#2d6b2d;--neutral-700:#1a5c1a;--neutral-800:#052005;
  --neutral-black:#052005;--neutral-border:rgba(5,32,5,.14);
  --success-light:#d3f6cf;--success:#0d7a7a;--success-dark:#0f5c5c;
  --warning-light:#ffebb7;--warning:#fcba3a;--warning-dark:#da9021;
  --danger-light:#ffe0e0;--danger:#f15656;--info:#0a75c3;
  --radius-md:10px;--radius-lg:14px;--radius-xl:20px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--neutral-bg)}
body{font-family:var(--font);color:var(--neutral-800);background:var(--neutral-bg);min-height:100vh;-webkit-font-smoothing:antialiased}

.nav{background:var(--neutral-white);border-bottom:1px solid var(--neutral-border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.nav-logo{font-size:17px;font-weight:800;color:var(--primary-500);text-decoration:none;letter-spacing:-.4px;display:flex;align-items:center;gap:7px}
.nav-logo-icon{width:28px;height:28px;background:var(--primary-400);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.nav-links{display:flex;gap:18px;align-items:center}
.nav-link{font-size:13px;font-weight:600;color:var(--neutral-700);text-decoration:none}
.nav-link.is-active{color:var(--primary-500)}.nav-link:hover{color:var(--primary-500)}
@media(max-width:640px){.nav-links{display:none}}

.page{max-width:900px;margin:0 auto;padding:22px 16px 80px}

/* breadcrumb + header */
.crumb{font-size:12px;color:var(--neutral-600);margin-bottom:12px}
.crumb a{color:var(--primary-500);text-decoration:none}
.crumb a:hover{text-decoration:underline}
.t-head{margin-bottom:16px}
.t-title{font-size:26px;font-weight:800;letter-spacing:-.5px;line-height:1.2;color:var(--neutral-black)}
.t-sub{font-size:13px;color:var(--neutral-600);margin-top:8px;line-height:1.55;max-width:680px}
.t-meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--neutral-700)}
.t-meta b{color:var(--neutral-black)}
.sortbar{display:inline-flex;align-items:center;gap:6px;background:var(--primary-100);color:var(--primary-600);font-weight:700;font-size:12px;padding:5px 12px;border-radius:20px}

/* cuisine filter pills */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 8px;position:sticky;top:56px;background:var(--neutral-bg);padding:10px 0;z-index:50}
.pill{border:1px solid var(--neutral-border);background:var(--neutral-white);color:var(--neutral-700);font-size:13px;font-weight:600;padding:7px 14px;border-radius:30px;cursor:pointer;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.pill:hover{border-color:var(--primary-300)}
.pill.is-active{background:var(--primary-400);border-color:var(--primary-400);color:#fff}
.pill .cnt{font-size:11px;opacity:.7}

/* best-of band (default view) */
.bestof{margin:10px 0 4px}
.bestof-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--neutral-600);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.bestof-label::after{content:'';flex:1;height:1px;background:var(--neutral-border)}
.bestof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:820px){.bestof-grid{grid-template-columns:1fr}}
.bestcard{background:var(--neutral-white);border:1px solid var(--neutral-border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden}
.bestcard-head{padding:13px 14px 10px;border-bottom:1px solid var(--neutral-100);display:flex;align-items:center;gap:8px}
.bestcard-head .ic{font-size:18px}
.bestcard-head .tt{font-size:13px;font-weight:800;color:var(--neutral-black);line-height:1.25}
.bestmini{display:flex;align-items:center;gap:9px;padding:8px 12px;text-decoration:none;color:inherit;border-top:1px solid var(--neutral-100)}
.bestmini:first-of-type{border-top:none}
.bestmini:hover{background:var(--primary-100)}
.bestmini .rk{width:18px;font-size:11px;font-weight:800;color:var(--neutral-600)}
.bestmini .nm{flex:1;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bestmini .sc{font-size:12px;font-weight:800}

/* ranked list */
.list-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--neutral-600);margin:22px 0 12px;display:flex;align-items:center;gap:8px}
.list-label::after{content:'';flex:1;height:1px;background:var(--neutral-border)}
.rlist{display:flex;flex-direction:column;gap:12px}
.rcard{background:var(--neutral-white);border:1px solid var(--neutral-border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:16px;display:flex;gap:14px;align-items:flex-start;text-decoration:none;color:inherit;transition:box-shadow .2s,border-color .2s;position:relative}
.rcard:hover{box-shadow:var(--shadow-md);border-color:var(--primary-300)}
.rcard.top3{border-color:var(--primary-200);background:linear-gradient(135deg,var(--neutral-white) 0%,var(--primary-100) 100%)}
.rank-badge{flex-shrink:0;width:42px;height:42px;border-radius:12px;background:var(--neutral-100);color:var(--neutral-700);font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center}
.rcard:nth-child(1) .rank-badge{background:#fdebc4;color:#9a6b04}
.rcard:nth-child(2) .rank-badge{background:#e7eaec;color:#5a6266}
.rcard:nth-child(3) .rank-badge{background:#f6e2d2;color:#8a5326}
.rmain{flex:1;min-width:0}
.rname{font-size:16px;font-weight:800;color:var(--neutral-black);letter-spacing:-.2px;line-height:1.3}
.rtags{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--neutral-600);align-items:center}
.rtags .cuisine-tag{font-weight:600;color:var(--primary-500);background:var(--primary-100);padding:2px 9px;border-radius:20px}
.rtags .nearby-tag{font-weight:600;color:var(--warning-dark);background:var(--warning-light);padding:2px 9px;border-radius:20px}
.rstars{color:var(--warning-dark);font-weight:700}
.raddr{font-size:12px;color:var(--neutral-600);margin-top:6px}
.rfoot{display:flex;align-items:center;gap:10px;margin-top:10px}
.choice-badge{font-size:10px;font-weight:700;color:var(--success-dark);background:var(--success-light);padding:3px 9px;border-radius:20px;display:inline-flex;gap:4px;align-items:center}
.view-link{font-size:12px;font-weight:700;color:var(--primary-500);margin-left:auto}
.view-link::after{content:' →'}
/* score block */
.rscore{flex-shrink:0;text-align:center;width:64px}
.rscore .ring{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;border:4px solid;margin:0 auto}
.rscore .cap{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--neutral-600);margin-top:5px}
.rscore .out{font-size:9px;color:var(--neutral-300)}
@media(max-width:540px){.rcard{flex-wrap:wrap}.rscore{order:-1}}

.empty{text-align:center;padding:50px 20px;color:var(--neutral-600);font-size:14px}
.foot-note{font-size:11px;color:var(--neutral-600);text-align:center;margin-top:26px;line-height:1.6}
.foot-note a{color:var(--primary-500);text-decoration:none}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo"><span class="nav-logo-icon">🍽</span> EatAdvisor</a>
  <div class="nav-links">
    <a class="nav-link" href="/">Overview</a>
    <a class="nav-link" href="/leaderboard">Leaderboard</a>
    <a class="nav-link is-active" href="/rankings">Rankings</a>
    <a class="nav-link" href="/services.html">Services</a>
  </div>
</nav>

<div class="page">
  <div class="crumb"><a href="/rankings">Rankings</a> › <span id="crumbTown">Edison, NJ</span></div>

  <header class="t-head">
    <h1 class="t-title" id="tTitle">Best Restaurants in Edison, New Jersey</h1>
    <p class="t-sub" id="tSub"></p>
    <div class="t-meta">
      <span><b id="mCount">0</b> restaurants ranked</span>
      <span class="sortbar">⬇ Sorted by EatAdvisor score</span>
    </div>
  </header>

  <div class="pills" id="pills"></div>

  <div id="bestof" class="bestof"></div>

  <div class="list-label" id="listLabel">Full ranking</div>
  <div class="rlist" id="rlist"></div>

  <p class="foot-note" id="footNote"></p>
</div>

<script src="/assets/eatadvisor-edison.js"></script>
<script>
(function(){
"use strict";
var DS = window.EATADVISOR_DATASET || { town:{}, cuisines:[], restaurants:[], leaderboards:[] };
var town = DS.town || {};
var params = new URLSearchParams(location.search);
var activeCuisine = (params.get("cuisine")||"").trim().toLowerCase() || "all";

function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function scoreColor(s){return s>=85?"var(--success)":s>=70?"var(--info)":s>=55?"var(--warning-dark)":"var(--danger)"}
function levelLabel(s){return s>=85?"Excellent":s>=70?"Great":s>=55?"Good":"Fair"}
function cuisineMeta(key){for(var i=0;i<DS.cuisines.length;i++){if(DS.cuisines[i].key===key)return DS.cuisines[i]}return{key:key,label:key,icon:"🍽"}}
function sortByScore(a,b){return b.score-a.score || b.rating-a.rating}

var townLabel = (town.name||"")+", "+(town.stateAbbr||"");
var townFull = (town.name||"")+", "+(town.state||"");
document.getElementById("crumbTown").textContent = townLabel;

/* count restaurants per cuisine for the pills */
function countFor(key){
  if(key==="all")return DS.restaurants.length;
  return DS.restaurants.filter(function(r){return r.cuisine===key}).length;
}

/* ── pills ───────────────────────────────────────────────────────────────── */
function renderPills(){
  var pills = [{key:"all",label:"All",icon:"🏆"}].concat(
    DS.cuisines.filter(function(c){return countFor(c.key)>0})
  );
  var el = document.getElementById("pills");
  el.innerHTML = pills.map(function(c){
    var active = c.key===activeCuisine;
    return '<button class="pill'+(active?" is-active":"")+'" data-cuisine="'+esc(c.key)+'">'
      + '<span>'+c.icon+'</span><span>'+esc(c.label)+'</span><span class="cnt">'+countFor(c.key)+'</span></button>';
  }).join("");
  Array.prototype.forEach.call(el.querySelectorAll(".pill"), function(btn){
    btn.addEventListener("click", function(){
      activeCuisine = btn.getAttribute("data-cuisine");
      var u = new URL(location.href);
      if(activeCuisine==="all") u.searchParams.delete("cuisine"); else u.searchParams.set("cuisine",activeCuisine);
      history.replaceState(null,"",u);
      renderAll();
    });
  });
}

/* ── default "Best X in {town} or nearby" band (All view only) ─────────────── */
function renderBestOf(){
  var host = document.getElementById("bestof");
  if(activeCuisine!=="all"){ host.innerHTML=""; return; }
  var cards = DS.leaderboards.map(function(b){
    var rows = DS.restaurants.filter(function(r){return r.cuisine===b.cuisine}).sort(sortByScore).slice(0,5);
    var mini = rows.map(function(r,i){
      return '<a class="bestmini" href="/restaurant-local-ranking.html?slug='+encodeURIComponent(r.slug)+'">'
        + '<span class="rk">'+(i+1)+'</span><span class="nm">'+esc(r.name)+'</span>'
        + '<span class="sc" style="color:'+scoreColor(r.score)+'">'+r.score+'</span></a>';
    }).join("");
    return '<div class="bestcard"><div class="bestcard-head"><span class="ic">'+b.icon+'</span>'
      + '<span class="tt">'+esc(b.title)+'</span></div>'+mini+'</div>';
  }).join("");
  host.innerHTML = '<div class="bestof-label">Best in '+esc(townFull)+' or nearby</div>'
    + '<div class="bestof-grid">'+cards+'</div>';
}

/* ── main ranked list ──────────────────────────────────────────────────────── */
function renderList(){
  var rows = DS.restaurants.slice();
  if(activeCuisine!=="all") rows = rows.filter(function(r){return r.cuisine===activeCuisine});
  rows.sort(sortByScore);

  document.getElementById("mCount").textContent = rows.length;

  var label = document.getElementById("listLabel");
  if(activeCuisine==="all"){ label.textContent = "Full ranking — "+rows.length+" restaurants"; }
  else { var m=cuisineMeta(activeCuisine); label.textContent = m.icon+" Best "+m.label+" in "+townFull+" or nearby"; }

  var host = document.getElementById("rlist");
  if(!rows.length){ host.innerHTML = '<div class="empty">No restaurants ranked yet for this cuisine.</div>'; return; }

  host.innerHTML = rows.map(function(r,i){
    var rank=i+1, c=scoreColor(r.score), m=cuisineMeta(r.cuisine);
    var choice = rank<=3 ? '<span class="choice-badge">🏅 EatAdvisor Choice</span>' : '';
    return '<a class="rcard'+(rank<=3?" top3":"")+'" href="/restaurant-local-ranking.html?slug='+encodeURIComponent(r.slug)+'">'
      + '<div class="rank-badge">'+rank+'</div>'
      + '<div class="rmain">'
      +   '<div class="rname">'+esc(r.name)+'</div>'
      +   '<div class="rtags">'
      +     '<span class="cuisine-tag">'+m.icon+' '+esc(m.label)+'</span>'
      +     '<span class="rstars">★ '+r.rating.toFixed(1)+'</span>'
      +     '<span>'+r.reviews.toLocaleString()+' reviews</span>'
      +     '<span>'+esc(r.price)+'</span>'
      +     (r.grade?'<span>DOH '+esc(r.grade)+'</span>':'')
      +     (r.nearby?'<span class="nearby-tag">'+esc(r.town)+' · nearby</span>':'')
      +   '</div>'
      +   '<div class="raddr">📍 '+esc(r.address)+'</div>'
      +   '<div class="rfoot">'+choice+'<span class="view-link">View EatAdvisor scorecard</span></div>'
      + '</div>'
      + '<div class="rscore"><div class="ring" style="border-color:'+c+';color:'+c+'">'+r.score+'</div>'
      +   '<div class="cap">'+levelLabel(r.score)+'</div><div class="out">out of 100</div></div>'
      + '</a>';
  }).join("");
}

function renderAll(){
  document.getElementById("pills").querySelectorAll(".pill").forEach(function(b){
    b.classList.toggle("is-active", b.getAttribute("data-cuisine")===activeCuisine);
  });
  var m = activeCuisine==="all" ? null : cuisineMeta(activeCuisine);
  document.getElementById("tTitle").textContent = m
    ? "Best "+m.label+" Restaurants in "+townFull
    : "Best Restaurants in "+townFull;
  document.title = (m?("Best "+m.label+" in "):("Best Restaurants in "))+townLabel+" — EatAdvisor";
  renderBestOf();
  renderList();
}

document.getElementById("tSub").textContent = town.blurb||"";
document.getElementById("footNote").innerHTML =
  (DS.isDemo ? "Demo dataset for "+esc(townLabel)+". Live Google ratings, review sentiment and NYC/NJ health grades load per market as EatAdvisor ingests it. " : "")
  + 'Ranking methodology: <a href="/rankings">EatAdvisor score</a> — one 0–100 number per restaurant, sorted high to low.';

renderPills();
renderAll();
})();
</script>
</body>
</html>
