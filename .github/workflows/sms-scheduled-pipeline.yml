# Daily SMS: up to 3 runs × 50 mobile NJ salons (America/New_York 9:00 / 12:00 / 17:00 windows).
# Requires repo secrets (Settings → Secrets → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
#   TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_SMS_FROM
#
# Important: GitHub checkout does not include your latest data/twilio_sms_sent_log.csv unless
# you commit it (or otherwise sync exclusions). For production, prefer a runner that keeps
# local state, or store sent slugs in Supabase and teach pick_* to read from there.

name: sms-scheduled-pipeline

on:
  schedule:
    # Minute 5 UTC, hour pairs chosen so America/New_York hits 9 / 12 / 17 in both EST and EDT.
    - cron: "5 13,14 * * *"
    - cron: "5 16,17 * * *"
    - cron: "5 21,22 * * *"
  workflow_dispatch:

concurrency:
  group: sms-scheduled-pipeline
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r pipelines/requirements.txt

      - name: Run scheduled SMS pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_SMS_FROM: ${{ secrets.TWILIO_SMS_FROM }}
        run: python scripts/scheduled_sms_pipeline.py --auto-slot --send
