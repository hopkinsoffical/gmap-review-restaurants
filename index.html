    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        var path = location.pathname || "";
        var onStoreVisit = /^\/stores\/[^/]+/i.test(path);
        var onAiAgent = /^\/ai-agents\/[a-z-]+/i.test(path);
        var onAnalysisList = path === "/analysis-reports" || path === "/analysis-reports/";
        var onAnalysisDetail = /^\/analysis-reports\/[^/]+/i.test(path);
        var saved = localStorage.getItem("site-theme");
        var theme = onStoreVisit || onAiAgent ? "dark" : saved === "dark" || saved === "light" ? saved : "light";
        if (onAnalysisList) theme = "dark";
        else if (onAnalysisDetail) theme = "light";
        document.documentElement.setAttribute("data-theme", theme);
        if (onStoreVisit) {
          document.documentElement.classList.add("store-theme-locked");
        }
      })();
    </script>

    <script>
      (function () {
        var p = String(location.pathname || "/").replace(/\/+$/, "") || "/";
        if (
          p === "/login" ||
          p === "/admin" ||
          p === "/admin/stores" ||
          p === "/admin/sms" ||
          p === "/admin/map-report" ||
          p === "/admin/report-generator" ||
          p.indexOf("/admin/stores/") === 0
        ) {
          document.documentElement.setAttribute("data-rms-portal-route", p);
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

  <body>
    <noscript>
      <section style="padding: 16px; font-family: Arial, sans-serif">
        <h1>RankMyRestaurant Leaderboard and Review Studio</h1>
        <p>
          Explore the restaurant leaderboard and Google Maps SEO scorecards at
          <a href="/leaderboard">/leaderboard</a>.
        </p>
      </section>
    </noscript>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <main id="appShell" class="app">
      <header id="pageHero" class="hero">
        <div class="hero-topline">
          <p id="brandName" class="brand">RankMyRestaurant</p>
          <div id="langMenu" class="lang-menu">
            <button
              id="langMenuToggle"
              class="lang-globe-btn"
              type="button"
              aria-label="Language"
              aria-haspopup="true"
              aria-expanded="false"
            >
              🌐
            </button>
            <div id="langMenuPopover" class="lang-menu-popover hidden" role="menu" aria-label="Language options">
              <button id="langOptionEn" type="button" class="lang-option-btn" role="menuitem">
                English
              </button>
              <button id="langOptionZh" type="button" class="lang-option-btn" role="menuitem">
                中文
              </button>
            </div>
          </div>
        </div>
        <h1 id="title"></h1>
        <p id="subtitle" class="subtitle"></p>
      </header>

      <section id="landingContent" class="landing-shell hidden"></section>
      <section id="portalContent" class="portal-shell hidden"></section>

      <div id="layout" class="layout single-stage">
        <section id="intakeCard" class="card intake-card">
          <div id="storeVisitReceiptBlock" class="store-visit-receipt-block">
          <div class="section-head">
            <h2 id="uploadTitle"></h2>
            <p id="uploadHint" class="hint"></p>
          </div>

          <input id="receiptInput" class="hidden-input" type="file" accept="image/*" />

          <div class="intake-pill-row" id="intakePillRow" role="group" aria-label="Receipt or review">
            <button id="uploadBtn" class="intake-pill intake-pill--primary" type="button"></button>
            <button id="retakeBtn" class="intake-pill intake-pill--primary hidden" type="button"></button>
            <button id="writeOwnReviewBtn" class="intake-pill intake-pill--outline" type="button"></button>
          </div>

          <div id="receiptPreview" class="receipt-preview empty">
            <p id="previewEmptyText" class="empty-text"></p>
          </div>

          <div id="receiptStatusGroup" class="receipt-status-group">
            <p id="receiptStatus" class="status"></p>
            <p id="receiptMeta" class="receipt-meta"></p>
          </div>
          </div>

          <div id="storeVisitShell" class="store-visit-shell">
            <header class="store-visit-brand" aria-label="Store">
              <h1 id="storeVisitBrandName" class="store-visit-brand-name"></h1>
            </header>

            <div id="storeVisitServiceCard" class="store-visit-service-card hidden" aria-live="polite">
              <span class="store-visit-service-icon" aria-hidden="true">✦</span>
              <div class="store-visit-service-copy">
                <p id="storeVisitServiceLabel" class="store-visit-service-label"></p>
                <p id="storeVisitServiceName" class="store-visit-service-name"></p>
              </div>
            </div>

            <section class="store-visit-hero" aria-labelledby="storeVisitHeroTitle">
              <h2 id="storeVisitHeroTitle" class="store-visit-hero-title"></h2>
            </section>

            <div class="store-visit-stars-block">
              <div id="storeVisitStars" class="store-visit-stars" role="radiogroup" aria-label="Rating"></div>
              <p id="storeVisitMood" class="store-visit-mood" aria-live="polite"></p>
              <p id="storeVisitHeroLead" class="store-visit-hero-lead"></p>
            </div>

            <div id="storeFlowCard" class="store-flow-card hidden" aria-live="polite"></div>
          </div>
        </section>

        <section id="dishesCard" class="card dishes-card hidden">
          <div class="section-head">
            <h2 id="dishesTitle"></h2>
            <p id="dishesHint" class="hint"></p>
          </div>

          <div id="recognizedSummary" class="summary-chip hidden"></div>
          <div id="recognizedList" class="recognized-list empty">
            <p id="recognizedEmptyText" class="empty-text"></p>
          </div>

          <button id="correctionToggle" class="ghost compact action-btn hidden" type="button"></button>

          <div id="correctionPanel" class="correction-block hidden">
            <label id="correctionLabel" class="mini-label" for="dishSearch"></label>
            <div class="correction-row">
              <select id="dishSearch" class="text-input select-input"></select>
            </div>

            <div class="secondary-actions slim-actions">
              <button id="retakeInlineBtn" class="ghost" type="button"></button>
              <button id="resetBtn" class="ghost" type="button"></button>
            </div>

            <div id="uncertainWrap" class="uncertain-wrap hidden">
              <p id="uncertainTitle" class="mini-label"></p>
              <ul id="uncertainList" class="uncertain-list"></ul>
            </div>
          </div>
        </section>

        <section id="reviewsCard" class="card reviews-card hidden">
          <div class="section-head">
            <h2 id="reviewsTitle"></h2>
            <p id="reviewsHint" class="hint"></p>
          </div>

          <div id="reviewContextBar" class="review-context-bar hidden">
            <button id="visitSummaryBtn" class="context-pill-btn" type="button">
              <span class="context-pill-copy">
                <span id="visitSummaryLabel" class="context-pill-label"></span>
                <span id="visitSummaryText" class="context-pill-value"></span>
              </span>
              <span id="visitSummaryAction" class="context-pill-action"></span>
            </button>

            <div class="service-module">
              <button id="serviceToggleBtn" class="service-toggle-btn" type="button">
                <span class="service-toggle-copy">
                  <span id="serviceToggleLabel" class="service-toggle-label"></span>
                  <span id="serviceToggleText" class="service-toggle-value"></span>
                </span>
                <span id="serviceToggleMeta" class="service-toggle-meta"></span>
              </button>

              <div id="servicePanel" class="service-panel">
                <label id="serviceNameLabel" class="mini-label" for="serviceStaffSelect"></label>
                <select id="serviceStaffSelect" class="text-input select-input"></select>

                <p id="servicePraiseLabel" class="mini-label"></p>
                <div id="servicePraiseOptions" class="choice-grid"></div>

                <div class="secondary-actions slim-actions">
                  <button id="serviceClearBtn" class="ghost compact" type="button"></button>
                  <button id="serviceApplyBtn" class="ghost compact" type="button"></button>
                </div>
              </div>
            </div>
          </div>

          <p id="reviewsStatus" class="status"></p>
          <a
            id="manualOpenLink"
            class="manual-open-link hidden"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
          ></a>

          <div id="reviewsGrid" class="reviews-grid empty">
            <p id="reviewsEmptyText" class="empty-text"></p>
          </div>

          <div id="loyaltyPromoPanel" class="loyalty-promo-panel hidden">
            <p id="loyaltyPromoIntro" class="loyalty-promo-intro"></p>
            <div id="loyaltyPromoForm" class="loyalty-promo-form">
              <input
                id="loyaltyPromoPhone"
                class="text-input"
                type="tel"
                inputmode="tel"
                autocomplete="tel"
              />
              <label class="loyalty-promo-consent">
                <input id="loyaltyPromoConsent" type="checkbox" />
                <span id="loyaltyPromoConsentText"></span>
              </label>
              <div class="secondary-actions slim-actions">
                <button id="loyaltyPromoSkipBtn" class="ghost compact" type="button"></button>
                <button id="loyaltyPromoSubmitBtn" class="primary compact" type="button"></button>
              </div>
            </div>
            <div id="loyaltyPromoResult" class="loyalty-promo-result hidden">
              <p id="loyaltyPromoCodeText" class="loyalty-promo-code"></p>
              <button id="loyaltyPromoContinueBtn" class="primary compact" type="button"></button>
            </div>
            <p id="loyaltyPromoStatus" class="status"></p>
          </div>

          <button id="anotherSetBtn" class="ghost compact refresh-btn hidden" type="button"></button>
          <button id="reviewWriteOwnBtn" class="ghost compact review-write-own-btn hidden" type="button"></button>
        </section>
      </div>
    </main>

    <div id="storePrivateFeedbackBackdrop" class="store-private-feedback-backdrop" hidden>
      <div
        id="storePrivateFeedbackDialog"
        class="store-private-feedback-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="storePrivateFeedbackTitle"
      >
        <button
          type="button"
          id="storePrivateFeedbackCloseBtn"
          class="store-private-feedback-close"
          aria-label="Close"
        >
          ×
        </button>

        <div id="storePrivateFeedbackFormPane">
          <h2 id="storePrivateFeedbackTitle" class="store-private-feedback-title"></h2>
          <p id="storePrivateFeedbackIntro" class="store-private-feedback-intro"></p>
          <form id="storePrivateFeedbackForm" class="store-private-feedback-form" novalidate>
            <label class="store-private-feedback-label"
              ><span id="storePrivateLabelName"></span
              ><input
                id="storePrivateInputName"
                class="text-input"
                name="name"
                type="text"
                autocomplete="name"
                maxlength="200"
                required
            /></label>
            <label class="store-private-feedback-label"
              ><span id="storePrivateLabelPhone"></span
              ><input
                id="storePrivateInputPhone"
                class="text-input"
                name="phone"
                type="tel"
                autocomplete="tel"
                maxlength="64"
            /></label>
            <label class="store-private-feedback-label"
              ><span id="storePrivateLabelGoogle"></span
              ><input
                id="storePrivateInputGoogle"
                class="text-input"
                name="googleAccount"
                type="email"
                autocomplete="email"
                maxlength="254"
                inputmode="email"
            /></label>
            <label class="store-private-feedback-label store-private-feedback-label--block"
              ><span id="storePrivateLabelMessage"></span
              ><textarea
                id="storePrivateInputMessage"
                class="text-input store-private-feedback-textarea"
                name="message"
                rows="5"
                maxlength="12000"
                required
              ></textarea>
            </label>
            <p id="storePrivateFeedbackFormError" class="store-private-feedback-error hidden" role="alert"></p>
            <div class="store-private-feedback-actions">
              <button type="button" id="storePrivateFeedbackCancelBtn" class="ghost"></button>
              <button type="submit" id="storePrivateFeedbackSubmitBtn" class="cta"></button>
            </div>
          </form>
        </div>

        <div id="storePrivateFeedbackThanksPane" class="store-private-feedback-thanks hidden">
          <h2 id="storePrivateFeedbackThanksTitle" class="store-private-feedback-title"></h2>
          <p id="storePrivateFeedbackThanksBody" class="store-private-feedback-intro"></p>
          <button type="button" id="storePrivateFeedbackThanksDoneBtn" class="cta"></button>
        </div>
      </div>
    </div>

    <div id="visitSheetBackdrop" class="sheet-backdrop">
      <div
        id="visitSheet"
        class="visit-sheet"
        role="dialog"
        aria-modal="true"
        aria-labelledby="visitSheetTitle"
        aria-describedby="visitSheetHint"
      >
        <div id="visitSheetDragZone" class="sheet-drag-zone" aria-hidden="true">
          <div class="sheet-grabber"></div>
        </div>
        <h2 id="visitSheetTitle"></h2>
        <p id="visitSheetHint" class="hint"></p>
        <div id="visitOptions" class="visit-options"></div>
        <button id="visitContinueBtn" class="cta" type="button"></button>
      </div>
    </div>

    <div id="pricingSummaryBackdrop" class="pricing-summary-backdrop hidden" aria-hidden="true">
      <div
        id="pricingSummaryDialog"
        class="pricing-summary-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="pricingSummaryTitle"
        aria-describedby="pricingSummaryBody"
      >
        <button id="pricingSummaryCloseBtn" class="pricing-summary-close" type="button" aria-label="Close order summary">
          ×
        </button>
        <p class="pricing-summary-kicker">Order Summary</p>
        <h2 id="pricingSummaryTitle"></h2>
        <p id="pricingSummaryBody" class="pricing-summary-body"></p>
        <div id="pricingSummaryLines" class="pricing-summary-lines"></div>
        <div class="pricing-summary-total-card">
          <div class="pricing-summary-total-row">
            <span>Due today</span>
            <strong id="pricingSummaryDueToday"></strong>
          </div>
          <div class="pricing-summary-total-row is-recurring">
            <span>Recurring after checkout</span>
            <strong id="pricingSummaryRecurring"></strong>
          </div>
        </div>
        <div class="pricing-summary-actions">
          <button id="pricingSummaryBackBtn" class="ghost pricing-summary-back-btn" type="button">Back</button>
          <button id="pricingSummaryCheckoutBtn" class="cta pricing-summary-checkout-btn" type="button">
            Continue to Shopify Checkout
          </button>
        </div>
        <p class="pricing-summary-security-note">Secure checkout powered by Shopify.</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/app.js?v=20260626-1"></script>
    <script src="/portal.js?v=20260511-1"></script>
  </body>
</html>
