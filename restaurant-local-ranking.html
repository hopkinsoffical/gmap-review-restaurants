<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Restaurant Local Ranking Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
/* ── Zoca Design Tokens ── */
:root {
  --primary-100: #efffcc;
  --primary-200: #d9ff80;
  --primary-300: #c8ff4d;
  --primary-400: #052005;
  --primary-500: #052005;
  --primary-600: #041804;
  --primary-700: #021502;
  --lime: #b0ff00;

  --neutral-bg:     #e8ffb3;
  --neutral-white:  #ffffff;
  --neutral-100:    #efffcc;
  --neutral-200:    #d4f5a0;
  --neutral-300:    #b8e86a;
  --neutral-600:    #2d6b2d;
  --neutral-700:    #1a5c1a;
  --neutral-800:    #052005;
  --neutral-black:  #052005;
  --neutral-border: rgba(5, 32, 5, 0.14);

  --success-light:  #d3f6cf;
  --success:        #0d7a7a;
  --success-dark:   #0f5c5c;
  --warning-light:  #ffebb7;
  --warning:        #fcba3a;
  --warning-dark:   #da9021;
  --danger-light:   #ffe0e0;
  --danger:         #f15656;
  --danger-dark:    #c83448;
  --info-light:     #bfe2fc;
  --info:           #0a75c3;

  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  14px;
  --radius-xl:  20px;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:  0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.10);

  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--neutral-bg); }
body {
  font-family: var(--font);
  color: var(--neutral-800);
  background: var(--neutral-bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Top Navigation ── */
.nav {
  background: var(--neutral-white);
  border-bottom: 1px solid var(--neutral-border);
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo {
  font-size: 17px;
  font-weight: 800;
  color: var(--primary-500);
  text-decoration: none;
  letter-spacing: -0.4px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.nav-logo-icon {
  width: 28px;
  height: 28px;
  background: var(--primary-400);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 14px;
}
.nav-cta {
  background: var(--primary-400);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  font-family: var(--font);
  transition: background .15s;
}
.nav-cta:hover { background: var(--primary-600); }

/* ── Page shell ── */
.page {
  max-width: 760px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* ── Score Hero ── */
.hero {
  background: var(--neutral-white);
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-xl);
  padding: 28px 24px 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.hero-top {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  margin-bottom: 20px;
}
.hero-info { flex: 1; min-width: 0; }
.hero-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: .01em;
}
.badge-purple { background: var(--primary-100); color: var(--primary-500); }
.badge-success { background: var(--success-light); color: var(--success-dark); }
.badge-warning { background: var(--warning-light); color: var(--warning-dark); }
.badge-danger  { background: var(--danger-light);  color: var(--danger-dark); }
.badge-neutral { background: var(--neutral-100); color: var(--neutral-700); }

.hero-name {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.25;
  color: var(--neutral-black);
  margin-bottom: 4px;
  letter-spacing: -.3px;
}
.hero-meta {
  font-size: 13px;
  color: var(--neutral-600);
  margin-bottom: 10px;
  line-height: 1.5;
}
.hero-category {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  color: var(--neutral-700);
  background: var(--neutral-100);
  border: 1px solid var(--neutral-border);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
}

/* Score ring */
.hero-score { flex-shrink: 0; text-align: center; }
.score-ring-wrap { display: inline-block; position: relative; }
.score-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-top: 5px;
  display: block;
}
.score-sub { font-size: 10px; color: var(--neutral-600); margin-top: 2px; }

/* ── 4 stat grid ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 16px;
}
@media (max-width: 480px) { .stat-grid { grid-template-columns: repeat(2,1fr); } }
.stat-card {
  background: var(--neutral-100);
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
}
.stat-label { font-size: 11px; color: var(--neutral-600); font-weight: 500; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 800; line-height: 1.2; letter-spacing: -.3px; }
.stat-sub { font-size: 11px; color: var(--neutral-600); margin-top: 3px; }
.c-success { color: var(--success); }
.c-warning { color: var(--warning-dark); }
.c-danger  { color: var(--danger); }
.c-purple  { color: var(--primary-400); }
.c-info    { color: var(--info); }
.c-neutral { color: var(--neutral-700); }

/* ── Alert callout ── */
.callout {
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 16px;
  border: 1px solid;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.callout--success { background: #f0fdf8; border-color: #a7f3d0; }
.callout--warning { background: #fffbeb; border-color: #fde68a; }
.callout--danger  { background: #fff5f5; border-color: #fecaca; }
.callout--purple  { background: var(--primary-100); border-color: var(--primary-200); }
.callout-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.callout-body { flex: 1; }
.callout-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--neutral-black); }
.callout-text  { font-size: 13px; color: var(--neutral-700); line-height: 1.6; }

/* ── Section header ── */
.sec-head {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--neutral-600);
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--neutral-border);
}

/* ── 6 Dimension Cards ── */
.dim-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 4px;
}
@media (max-width: 520px) { .dim-grid { grid-template-columns: repeat(2,1fr); } }

.dim-card {
  background: var(--neutral-white);
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-lg);
  padding: 16px;
  position: relative;
  transition: box-shadow .2s, border-color .2s;
  overflow: hidden;
}
.dim-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--primary-300);
}
.dim-card::after {
  content: '';
  position: absolute;
  inset: 0 0 auto 0;
  height: 3px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.dim-card.green::after  { background: var(--success); }
.dim-card.blue::after   { background: var(--info); }
.dim-card.yellow::after { background: var(--warning); }
.dim-card.red::after    { background: var(--danger); }

.dim-icon { font-size: 20px; margin-bottom: 8px; }
.dim-name {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--neutral-600);
  margin-bottom: 8px;
}
.dim-score-wrap { display: flex; align-items: baseline; gap: 3px; margin-bottom: 8px; }
.dim-score-num  { font-size: 30px; font-weight: 800; letter-spacing: -.5px; line-height: 1; }
.dim-score-denom{ font-size: 12px; color: var(--neutral-600); }

.dim-bar-track  { height: 5px; background: var(--neutral-200); border-radius: 3px; overflow: hidden; }
.dim-bar-fill   { height: 100%; border-radius: 3px; transition: width .8s cubic-bezier(.4,0,.2,1); }
.dim-bar-fill.green  { background: var(--success); }
.dim-bar-fill.blue   { background: var(--info); }
.dim-bar-fill.yellow { background: var(--warning); }
.dim-bar-fill.red    { background: var(--danger); }

.dim-desc { font-size: 11px; color: var(--neutral-600); margin-top: 7px; line-height: 1.5; }

/* ── Breakdown table ── */
.breakdown-table {
  background: var(--neutral-white);
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 4px;
}
.breakdown-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--neutral-100);
  transition: background .15s;
}
.breakdown-row:last-child { border-bottom: none; }
.breakdown-row:hover { background: var(--neutral-100); }
.breakdown-left { flex: 1; min-width: 0; }
.breakdown-name { font-size: 13px; font-weight: 600; color: var(--neutral-800); }
.breakdown-sub  { font-size: 11px; color: var(--neutral-600); margin-top: 2px; }
.breakdown-bar-wrap { width: 90px; flex-shrink: 0; }
.breakdown-bar-track { height: 6px; background: var(--neutral-200); border-radius: 3px; overflow: hidden; }
.breakdown-bar-fill  { height: 100%; border-radius: 3px; }
.breakdown-num { font-size: 14px; font-weight: 700; width: 32px; text-align: right; flex-shrink: 0; }
.breakdown-wt  { font-size: 10px; color: var(--neutral-600); width: 28px; text-align: right; flex-shrink: 0; }

/* ── Checklist ── */
.checklist {
  background: var(--neutral-white);
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.check-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 12px 16px;
  border-bottom: 1px solid var(--neutral-100);
  transition: background .15s;
}
.check-row:last-child { border-bottom: none; }
.check-row:hover { background: var(--neutral-100); }
.check-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}
.check-ok   { background: var(--success-light); color: var(--success-dark); }
.check-warn { background: var(--warning-light); color: var(--warning-dark); }
.check-bad  { background: var(--danger-light);  color: var(--danger-dark);  }
.check-body { flex: 1; }
.check-title  { font-size: 13px; font-weight: 600; color: var(--neutral-800); margin-bottom: 2px; }
.check-detail { font-size: 11px; color: var(--neutral-600); line-height: 1.5; }

/* ── Service recommendation cards ── */
.svc-list { display: flex; flex-direction: column; gap: 10px; }
.svc-card {
  background: var(--neutral-white);
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-lg);
  padding: 18px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  text-decoration: none;
  color: inherit;
  transition: border-color .2s, box-shadow .2s;
  position: relative;
  overflow: hidden;
}
.svc-card:hover {
  border-color: var(--primary-300);
  box-shadow: var(--shadow-md);
}
.svc-card--top {
  border-color: var(--primary-300);
  background: linear-gradient(135deg, var(--neutral-white) 0%, var(--primary-100) 100%);
}
.svc-card--top::before {
  content: '⭐ Best Match';
  position: absolute;
  top: 0;
  right: 0;
  background: var(--primary-400);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-bottom-left-radius: var(--radius-sm);
}
.svc-rank {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--primary-100);
  color: var(--primary-500);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.svc-card--top .svc-rank {
  background: var(--primary-400);
  color: #fff;
}
.svc-body { flex: 1; min-width: 0; }
.svc-name { font-size: 15px; font-weight: 700; color: var(--neutral-black); margin-bottom: 3px; }
.svc-tagline { font-size: 12px; color: var(--neutral-600); margin-bottom: 10px; line-height: 1.5; }
.svc-dims { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.svc-dim-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--success-light);
  color: var(--success-dark);
}
.svc-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.svc-lift {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary-500);
  background: var(--primary-100);
  padding: 3px 9px;
  border-radius: 20px;
}
.svc-cta-link {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary-500);
  display: flex;
  align-items: center;
  gap: 4px;
  text-decoration: none;
}
.svc-cta-link::after { content: '→'; }

/* ── Score comparison ── */
.compare-block {
  background: var(--neutral-white);
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 4px;
}
.compare-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.compare-row:last-child { margin-bottom: 0; }
.compare-name { font-size: 12px; font-weight: 600; width: 100px; flex-shrink: 0; color: var(--neutral-700); }
.compare-track { flex: 1; height: 10px; background: var(--neutral-200); border-radius: 5px; overflow: hidden; position: relative; }
.compare-fill { height: 100%; border-radius: 5px; }
.compare-you  { background: var(--primary-400); }
.compare-area { background: var(--neutral-300); }
.compare-val  { font-size: 12px; font-weight: 700; width: 30px; text-align: right; flex-shrink: 0; }

/* ── Bottom CTA ── */
.cta-section {
  background: var(--lime);
  border-radius: var(--radius-xl);
  padding: 36px 28px;
  text-align: center;
  color: var(--primary-400);
  margin-top: 28px;
  position: relative;
  overflow: hidden;
}
.cta-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(5, 32, 5, 0.04) 0%, transparent 60%);
  pointer-events: none;
}
.cta-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  opacity: .7;
  margin-bottom: 10px;
}
.cta-title {
  font-size: 24px;
  font-weight: 800;
  line-height: 1.25;
  margin-bottom: 10px;
  letter-spacing: -.3px;
}
.cta-subtitle {
  font-size: 14px;
  opacity: .8;
  margin-bottom: 24px;
  line-height: 1.6;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}
.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--primary-400);
  color: #fff;
  padding: 13px 28px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  transition: background .2s, transform .2s;
  letter-spacing: -.1px;
}
.cta-btn:hover { background: var(--primary-600); transform: translateY(-1px); }
.cta-note { font-size: 11px; opacity: .65; margin-top: 12px; }

/* ── Loading / Error ── */
.loading-wrap {
  text-align: center;
  padding: 80px 20px;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--neutral-200);
  border-top-color: var(--primary-400);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--neutral-600); }

.error-wrap {
  text-align: center;
  padding: 60px 20px;
  background: var(--neutral-white);
  border: 1px solid var(--neutral-border);
  border-radius: var(--radius-xl);
}
.error-icon  { font-size: 36px; margin-bottom: 12px; }
.error-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.error-msg   { font-size: 13px; color: var(--neutral-600); }

/* ── Responsive ── */
@media (max-width: 600px) {
  .hero-top { flex-direction: column-reverse; gap: 12px; }
  .hero-score { display: flex; align-items: center; gap: 12px; }
  .score-label, .score-sub { display: inline; margin-left: 4px; }
}
</style>
</head>

</div>

/* ══ SCORING ENGINE ════════════════════════════════════════════════════ */
function clamp(v,lo,hi){return Math.max(lo||0,Math.min(hi||100,Number(v)||0))}
function r1(v){return Math.round(clamp(v)*10)/10}

function ratingScore(rating){return r1(Math.max(0,(clamp(rating,1,5)-3.5)/1.5)*100)}
function volumeScore(n){n=Math.max(0,Math.floor(Number(n)||0));return r1(Math.log10(n+1)/Math.log10(2000)*100)}

function profileScore(p){

}
function serviceScore(ai){

  var del=flag("Service options","Delivery"),tak=flag("Service options","Takeout"),din=flag("Service options","Dine-in"),tbl=flag("Dining options","Table service"),res=flag("Planning","Accepts reservations")||flag("Planning","Reservations recommended");
  var s=0;
  s+=del===true?25:del===null?12:0; s+=tak===true?20:tak===null?10:0; s+=din===true?25:din===null?12:0;
  s+=tbl===true?15:tbl===null?7:0;  s+=res===true?15:res===null?7:0;
  return r1(clamp(s));
}
function valueScore(price,rating){
  var rs=ratingScore(rating)/100,p=String(price||"").trim();
  var m=p==="$"||/^\$1/.test(p)?1.20:p==="$$"?1.00:p==="$$$"?0.80:p==="$$$$"?0.65:1.00;
  return r1(clamp(rs*m*100));
}
function opsScore(p){
  if(p.permanently_closed)return 0;
  var s=40;
  if(!p.temporarily_closed)s+=30;
  if(p.opening_hours&&(Array.isArray(p.opening_hours)?p.opening_hours.length>0:true))s+=20;
  var pt=p.popular_times_histogram||{};
  if(typeof pt==="object"&&Object.keys(pt).length>0)s+=10;
  return r1(clamp(s));
}
function conversionScore(p){
  function has(v){return v!=null&&String(v).trim().length>0}
  return r1((has(p.phone)?50:0)+(has(p.best_menu_url)?30:0)+(has(p.reserve_table_url)?20:0));
}
var WEIGHTS={D1:.20,D2:.15,D3:.15,D4:.15,D5:.12,D6:.10,D7:.08,D8:.03,D9:.02};
function calcScore(dims,n){
  var b=dims.D1*WEIGHTS.D1+dims.D2*WEIGHTS.D2+dims.D3*WEIGHTS.D3+dims.D4*WEIGHTS.D4+dims.D5*WEIGHTS.D5+dims.D6*WEIGHTS.D6+dims.D7*WEIGHTS.D7+dims.D8*WEIGHTS.D8+dims.D9*WEIGHTS.D9;
  n=Math.max(0,Number(n)||0);var conf=1-Math.exp(-n/80),prior=0.50;
  return Math.round(clamp((prior+(b/100-prior)*(0.30+0.70*conf))*100)*10)/10;
}

function tone(s){return s>=80?"green":s>=60?"blue":s>=40?"yellow":"red"}
function toneColor(t){return t==="green"?"var(--success)":t==="blue"?"var(--info)":t==="yellow"?"var(--warning-dark)":"var(--danger)"}
function levelFromScore(s){
  if(s>=80)return{label:"EXCELLENT",tone:"green"};

/* ── Score Ring SVG ── */
function scoreRing(score,color,size){
  size=size||90;
  var r=(size-12)/2,circ=2*Math.PI*r,offset=circ-(circ*(score/100));
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'

    +' stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" stroke-linecap="round" transform="rotate(-90 '+(size/2)+' '+(size/2)+')"/>'
    +'<text x="'+(size/2)+'" y="'+(size/2+7)+'" text-anchor="middle" font-size="20" font-weight="800" fill="'+esc(color)+'" font-family="Inter,sans-serif">'+Math.round(score)+'</text>'

}

function prescribe(dims,n,max){
  max=max||3;var conf=1-Math.exp(-n/80),factor=.30+.70*conf;
  var ranked=SERVICES.map(function(svc){
    var liftScore=0,totalLift=0,affected=[];
    Object.keys(svc.impacts).forEach(function(k){
      var cur=dims[k]||50,gap=Math.max(0,100-cur),ach=Math.min(svc.impacts[k],gap),w=WEIGHTS[k]||0;
      liftScore+=ach*w; totalLift+=ach*w;
      if(cur<80) affected.push({key:k,cur:Math.round(cur),lift:Math.round(Math.min(svc.impacts[k],gap))});
    });
    affected.sort(function(a,b){return b.lift-a.lift});
    return Object.assign({},svc,{liftScore:liftScore,scoreLift:Math.round(totalLift*factor*10)/10,affected:affected.slice(0,2)});
  });
  ranked.sort(function(a,b){return b.liftScore-a.liftScore});
  return ranked.slice(0,max);
}

      +'<div class="dim-bar-track"><div class="dim-bar-fill '+t+'" style="width:'+Math.round(dim.score)+'%"></div></div>'
      +'<div class="dim-desc">'+esc(dim.sub)+'</div></div>';
  });
  html+='</div>';
  html+='<div class="cta-section"><div class="cta-eyebrow">EatAdvisor Ranking</div>'
    +'<div class="cta-title">See how '+esc(r.name)+' ranks against the town</div>'
    +'<div class="cta-subtitle">This restaurant scores '+r.score+'/100 on EatAdvisor. Compare it to every restaurant in '+esc(town.name||"town")+' and nearby.</div>'
    +'<a class="cta-btn" href="'+townHref+'">View the '+esc(town.name||"town")+' ranking →</a></div>';
  document.getElementById("app").innerHTML=html;
}

async function main(){
  if(!SLUG&&!PLACE_ID&&!CAMIS&&!BIZ_NAME){
    showError("No restaurant specified. Add ?slug=... or ?placeId=... or ?camis=... to the URL.");
    return;
  }

  /* Demo dataset short-circuit (seeded EatAdvisor towns) */
  var demo=findDemo(SLUG);
  if(demo){ renderDemo(demo); return; }
  try{
    var profile=null,restaurant={};

    /* Path 1: slug → leaderboard (pre-scored) */
    if(SLUG){
      var lb=await supabaseGet("restaurant_leaderboard",{slug:"eq."+SLUG,limit:1});
      if(lb&&lb.length){
        var lbRow=lb[0];
        if(lbRow.place_id){
          var fp=await supabaseGet("info_gather_google_profiles",{place_id:"eq."+lbRow.place_id,limit:1});
          profile=fp&&fp.length?fp[0]:null;
        }
        if(!profile) profile={title:lbRow.name,rating:lbRow.rating,reviews_count:lbRow.review_count,place_id:lbRow.place_id,camis:lbRow.camis,address:lbRow.address,city:lbRow.city,category_name:lbRow.category,phone:lbRow.phone,website:lbRow.website,image_url:lbRow.image_url,reviews_distribution:lbRow.reviews_distribution};
        if(lbRow.camis){var rr=await supabaseGet("info_gather_restaurants",{camis:"eq."+lbRow.camis,limit:1});restaurant=rr&&rr.length?rr[0]:{};}
        document.title=(lbRow.name||"Restaurant")+" — Local Ranking Report";
        render(profile,restaurant);
        return;
      }
    }

    /* Path 2: placeId / camis / name */
    var profiles=[];
    if(PLACE_ID) profiles=await supabaseGet("info_gather_google_profiles",{place_id:"eq."+PLACE_ID,limit:1});
    else if(CAMIS) profiles=await supabaseGet("info_gather_google_profiles",{camis:"eq."+CAMIS,limit:1});
    else if(BIZ_NAME){
      var bn=await supabaseGet("info_gather_restaurants",{name:"ilike."+encodeURIComponent("%"+BIZ_NAME+"%"),limit:1});
      if(bn&&bn.length) profiles=await supabaseGet("info_gather_google_profiles",{camis:"eq."+bn[0].camis,limit:1});
    }
    if(!profiles||!profiles.length){showError("Restaurant not found in our database.");return;}
    profile=profiles[0];
    var rl=await supabaseGet("info_gather_restaurants",{camis:"eq."+profile.camis,limit:1});
    restaurant=rl&&rl.length?rl[0]:{};
    document.title=(BIZ_NAME||profile.title||"Restaurant")+" — Local Ranking Report";
    render(profile,restaurant);
  }catch(e){showError("Failed to load data: "+e.message);}
}
main();
})();
</script>
</body>
</html>
